<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de 16 Botones de YouTube</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #121212;
        }

        /* Cuadrícula de 4x4 que ocupa toda la pantalla */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            height: 100vh;
            width: 100vw;
            padding: 10px;
            gap: 10px;
        }

        /* Estilo base de cada botón/enlace */
        .yt-button {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #282828;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            border: 2px solid #3e3e3e;
            transition: all 0.2s ease-in-out;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* Efectos visuales al interactuar */
        .yt-button:hover {
            background-color: #ff0000;
            border-color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 8px 15px rgba(255, 0, 0, 0.4);
            z-index: 10;
        }

        .yt-button:active {
            transform: scale(0.98);
        }

        /* Adaptabilidad para pantallas más pequeñas (móviles) */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(8, 1fr);
                height: auto;
                min-height: 100vh;
            }
            .yt-button {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <!-- Fila 1 -->
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 1</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 2</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 3</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 4</a>
        
        <!-- Fila 2 -->
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 5</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 6</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 7</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 8</a>
        
        <!-- Fila 3 -->
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 9</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 10</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 11</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 12</a>
        
        <!-- Fila 4 -->
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 13</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 14</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 15</a>
        <a href="https://youtube.com" class="yt-button" target="_blank">Botón 16</a>
    </div>

</body>
</html>
